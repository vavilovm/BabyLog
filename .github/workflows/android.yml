name: Android CI
permissions:
  contents: write
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  release:
    types: [ published ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci && npm run build
        working-directory: functions
      - run: ./gradlew verifyPaparazziDebug testDebugUnitTest assembleDebug
      - name: Restore release configuration
        if: github.event_name == 'release'
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          BABYLOG_KEYSTORE_BASE64: ${{ secrets.BABYLOG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          printf '%s' "$BABYLOG_KEYSTORE_BASE64" | base64 --decode > keystore/babylog-release.jks
      - name: Build signed release APK
        if: github.event_name == 'release'
        env:
          BABYLOG_STORE_FILE: keystore/babylog-release.jks
          BABYLOG_STORE_PASSWORD: ${{ secrets.BABYLOG_STORE_PASSWORD }}
          BABYLOG_KEY_PASSWORD: ${{ secrets.BABYLOG_KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: BabyLog-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: app/build/outputs/apk/release/app-release.apk
